<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Pastel Minimal</title>
    <link rel="stylesheet" href="style2.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="icon-avatar">
                    <i class="fas fa-feather-alt"></i>
                </div>
                <h1>Hello again!</h1>
                <p class="subhead">welcome back to your space</p>
            </div>

            <form id="loginForm2" action="#" method="POST">
                <div class="form-group">
                    <label for="loginEmail2"><i class="fas fa-envelope"></i> Email address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="email" id="loginEmail2" placeholder="hello@example.com" value="demo@project.dev" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword2"><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-unlock-alt"></i>
                        <input type="password" id="loginPassword2" placeholder="••••••••" value="password123" required />
                        <button type="button" class="toggle-password" id="togglePassBtn2">
                            <i class="fas fa-eye" id="eyeIcon2"></i>
                        </button>
                    </div>
                </div>

                <div class="form-extra">
                    <label class="remember">
                        <input type="checkbox" id="rememberMe2" checked /> Stay signed in
                    </label>
                    <a href="#" id="forgotLink2">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn2">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div id="loginFeedback2"></div>

            <div class="demo-hint">
                <i class="fas fa-palette"></i>
                <span><strong>Pastel</strong> · Soft Minimal Theme</span>
            </div>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
